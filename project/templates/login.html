<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CareerCompass AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-bg">
  <header class="topbar glass">
    <a href="/" class="brand">CareerCompass AI</a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    <nav id="navMenu" class="nav-links">
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/careers-page">Careers</a>
      <span id="userBadge" class="user-badge hidden"></span>
      <a href="#" id="logoutBtn" class="hidden">Logout</a>
    </nav>
  </header>

  <main class="auth-wrap">
    <section class="auth-card glass reveal">
      <p class="view-tag">Member Access</p>
      <h1>Login / Register</h1>
      <p>Access personalized AI-powered career insights.</p>
      <form id="loginForm" class="form">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" class="btn-primary full">Sign In</button>
      </form>
    </section>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
